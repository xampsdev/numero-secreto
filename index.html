<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Um jogo simples e interativo de adivinhação de números do 1 ao 50">
    <meta name="keywords" content="HTML, CSS, JavaScript, jogo, adivinhação, números, 1 a 50">
    <meta name="author" content="Alexandre Xan">
    
    <title>Número Secreto</title>

    <link rel="apple-touch-icon" sizes="180x180" href="imgverxan/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="imgverxan/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="imgverxan/favicon-16x16.png">
    <link rel="manifest" href="imgverxan/site.webmanifest">

    <link rel="stylesheet" href="nsstylexan.css">
</head>
<body>
    <canvas id="matrix"></canvas>
    <main class="app">
        <h1>
            Bem-Vindo ao Jogo do Número Secreto!
            <span class="badge-dificuldade" id="badgeDificuldade">MÉDIO</span>
        </h1>
        <h2>
            O número secreto está entre 1 e 50. Tente adivinhar!
        </h2>
        <div class="dificuldade">
            <label for="dificuldadeSelect">Dificuldade</label>
            <select id="dificuldadeSelect">
                <option value="20">Fácil (1–20)</option>
                <option value="50" selected>Médio (1–50)</option>
                <option value="100">Difícil (1–100)</option>
            </select>
        </div>
        <div class="localNumero">
            <label class="sr-only" for="NumeroSecreto">Digite seu palpite</label>
            <input type="number" name="NumeroSecreto" id="NumeroSecreto" min="1" max="50" step="1" inputmode="numeric" aria-label="Digite seu palpite">
        </div>
        <div class="status-bar">
            <span class="contador">Tentativas: 0</span>
            <span class="historico-label">Histórico:</span>
            <span class="historico">—</span>
        </div>
        <button class="botao">Adivinhar</button>
        <div class="toggle-animacao">
            <label class="toggle-label">
                <input type="checkbox" id="toggleAnimacao" checked>
                <span class="toggle-ui"></span>
                <span class="toggle-text">Fundo animado</span>
            </label>
        </div>
        <button class="botao-recomecar" id="botaoRecomecar">Jogar novamente</button>
        <p class="resultado" role="status" aria-live="polite"></p>
        <footer>
            <p>Criado por <a href="https://github.com/alexandrexan" target="_blank">XAN <span class="emoji">&#x1F448;</span></a></p>
        </footer>
    </main>
    <script src="ns.js"></script>
</body>
</html>
